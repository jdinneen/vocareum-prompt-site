<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mktg agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="panel simple-shell">
      <div class="topbar">
        <h1>mktg agent</h1>
        <button id="copyButton" type="button">Copy</button>
      </div>
      <p class="subline">Grounded in the Vocareum Product & Feature Catalog. Key stays server-side.</p>
      <p class="meta-line">
        <span id="modelName">Loading...</span>
        <span class="dot">•</span>
        <span id="sourceDate">Loading...</span>
      </p>
      <form id="promptForm" class="prompt-form">
        <textarea
          id="promptInput"
          name="promptInput"
          rows="10"
          placeholder="Type what you want. Example: Write homepage copy for Agentic AI Labs for technology platform buyers. Keep it direct and use only grounded proof."
          required
        ></textarea>
        <button id="submitButton" type="submit">Execute</button>
      </form>
      <pre id="outputBox">Output appears here.</pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
